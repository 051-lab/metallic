<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Localhost Dashboard Settings</title>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; background: #0f1117; color: #e2e8f0; }
    h1 { font-size: 20px; margin-bottom: 24px; }
    .section { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .section h2 { font-size: 14px; margin-bottom: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    label { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 14px; }
    input[type=checkbox] { width: 16px; height: 16px; }
    input[type=number], input[type=text] { background: #0f1117; border: 1px solid #2a2d3e; border-radius: 6px; color: #e2e8f0; padding: 6px 10px; font-size: 13px; width: 100%; margin-top: 4px; }
    .ports-label { flex-direction: column; align-items: flex-start; }
    .btn { background: #6366f1; border: none; border-radius: 6px; color: white; cursor: pointer; font-size: 13px; padding: 8px 18px; margin-top: 6px; }
    .btn:hover { background: #4f52c9; }
    #statusMsg { font-size: 13px; color: #22c55e; margin-left: 10px; opacity: 0; transition: opacity 0.3s; }
    #statusMsg.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>Localhost Dashboard Settings</h1>

  <div class="section">
    <h2>Scanning</h2>
    <label>
      <input type="checkbox" id="autoScan">
      Enable automatic port scanning
    </label>
    <label class="ports-label">
      Scan interval (minutes)
      <input type="number" id="scanInterval" min="1" max="60" value="5">
    </label>
  </div>

  <div class="section">
    <h2>Common Ports</h2>
    <label class="ports-label">
      Ports to scan (comma-separated)
      <input type="text" id="commonPorts" placeholder="3000, 5173, 8080, 8000, 4200, 5000, 8888">
    </label>
  </div>

  <button class="btn" id="saveBtn">Save Settings</button>
  <span id="statusMsg">Saved!</span>

  <script src="options.js"></script>
</body>
</html>
