<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Utilities</title>
    <link rel="stylesheet" href="ui.css">
  </head>
  <body class="popup-page">
    <header class="popup-header">
      <div>
        <p class="eyebrow">ACTIVE PAGE</p>
        <h1 id="siteName">Detecting…</h1>
        <p id="siteStatus">Checking platform access.</p>
      </div>
      <button id="settingsButton" class="icon-button" title="Settings" aria-label="Settings">⚙</button>
    </header>
    <button id="captureButton" class="primary-button">Open utilities</button>
    <button id="alwaysEnableButton" class="secondary-button" hidden>Always enable on this site</button>
    <section class="archive-section">
      <div class="section-title"><h2>Local archive</h2></div>
      <div class="filters">
        <input id="searchInput" type="search" placeholder="Search conversations">
        <select id="platformFilter" aria-label="Filter by platform">
          <option value="">All platforms</option>
        </select>
      </div>
      <div id="archiveList" class="archive-list"></div>
    </section>
    <script src="dist/popup.js"></script>
  </body>
</html>
