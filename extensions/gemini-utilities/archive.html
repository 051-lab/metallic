<!DOCTYPE html>
<html>
<head>
  <title>Archived Conversation</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #202124;
      color: #e8eaed;
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 300px;
      background-color: #303134;
      border-right: 1px solid #5f6368;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #5f6368;
    }
    .sidebar-header h2 {
      margin: 0 0 10px 0;
      font-size: 20px;
    }
    .actions button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background-color: #8ab4f8;
      color: #202124;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    .actions button.danger {
      background-color: #303134;
      color: #f28b82;
      border: 1px solid #f28b82;
    }
    .actions button.danger:hover {
      background-color: #f28b82;
      color: #202124;
    }
    .content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }
    pre {
      background-color: #282a36;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <h2 id="convoTitle">Loading...</h2>
      <div id="convoNotebook" style="display: none; background-color: #3f4e4f; color: #8ab4f8; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-top: 8px; margin-bottom: 8px; width: fit-content; font-weight: 600;"></div>
      <div id="convoDate" style="color: #9aa0a6; font-size: 12px; margin-bottom: 20px;"></div>
      <div class="actions">
        <button id="downloadBtn">Download Markdown</button>
        <button id="copyBtn">Copy to Clipboard</button>
        <button id="deleteBtn" class="danger">Delete Archive</button>
      </div>
    </div>
  </div>
  <div class="content">
    <pre id="markdownViewer"></pre>
  </div>
  <script src="storage.js"></script>
  <script src="archive.js"></script>
</body>
</html>
