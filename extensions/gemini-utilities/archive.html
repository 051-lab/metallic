<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archived conversation</title>
    <link rel="stylesheet" href="ui.css">
  </head>
  <body>
    <main class="viewer-page">
      <aside class="viewer-sidebar">
        <p class="eyebrow">LOCAL ARCHIVE</p>
        <h1 id="convoTitle">Loading…</h1>
        <p id="convoMeta"></p>
        <div class="viewer-actions">
          <button id="downloadBtn" class="primary-button">Download Markdown</button>
          <button id="jupyterBtn">Export Jupyter</button>
          <button id="copyBtn">Copy Markdown</button>
          <button id="deleteBtn" class="danger-button">Delete</button>
        </div>
      </aside>
      <article class="viewer-content"><pre id="markdownViewer"></pre></article>
    </main>
    <script src="dist/archive.js"></script>
  </body>
</html>
